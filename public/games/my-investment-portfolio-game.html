<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>תיק ההשקעות שלי</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #0b1220;
        color: #e2e8f0;
        font-family: Arial, sans-serif;
      }

      #app {
        min-height: 100vh;
      }

      .fallback {
        min-height: 100vh;
        display: grid;
        place-items: center;

      .box {
        max-width: 760px;
        background: #111827;
        border: 1px solid #334155;
        border-radius: 16px;
        padding: 24px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="fallback">
        <div class="box">טוען את משחק "תיק ההשקעות שלי"...</div>
      </div>
    </div>
    <script src="/games/my-investment-portfolio-game.js"></script>
